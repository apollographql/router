extend schema
  @link(
    url: "https://specs.apollo.dev/connect/v0.4"
    import: ["@connect", "@source"]
  )
  @source(name: "v1", http: { baseURL: "http://127.0.0.1" })

type Query {
  me: User
    @connect(
      mappingOnly: true
      source: "v1"
      http: { GET: "/me" }
      selection: """
        id
      """
    )
}

type User {
  id: ID!
}
