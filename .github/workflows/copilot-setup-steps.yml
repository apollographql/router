name: "Copilot Setup Steps"

# Automatically run the setup steps when they are changed to allow for easy validation, and
# allow manual testing through the repository's "Actions" tab
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    # Set the permissions to the lowest permissions possible needed for your steps.
    # Copilot will be given its own token for its operations.
    permissions:
      # If you want to clone the repository as part of your setup steps, for example to install dependencies, you'll need the `contents: read` permission. If you don't clone the repository in your setup steps, Copilot will do this for you automatically after the steps complete.
      contents: read

    # You can define any steps you want, and they will run before the agent starts.
    # If you do not check out your code, Copilot will do this for you.
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "24.x"

      - name: Get upstream skills repository HEAD
        id: skills-head
        run: |
          SKILLS_SHA=$(git ls-remote https://github.com/apollographql/skills.git HEAD | cut -f1)
          echo "sha=${SKILLS_SHA}" >> $GITHUB_OUTPUT
          echo "Upstream skills repository HEAD: ${SKILLS_SHA}"

      - name: Cache downloaded skills and instructions
        id: cache-skills
        uses: actions/cache@v4
        with:
          path: |
            ~/.copilot
          key: skills-${{ steps.skills-head.outputs.sha }}
          restore-keys: |
            skills-

      - name: Clone skills repository at specific SHA
        if: steps.cache-skills.outputs.cache-hit != 'true'
        run: |
          echo "Cloning apollographql/skills at SHA ${{ steps.skills-head.outputs.sha }}"
          git clone https://github.com/apollographql/skills.git /tmp/skills-repo
          cd /tmp/skills-repo
          git checkout ${{ steps.skills-head.outputs.sha }}
          echo "Skills repository cloned and checked out to ${{ steps.skills-head.outputs.sha }}"

      - name: Install Rust Best Practices Skill
        if: steps.cache-skills.outputs.cache-hit != 'true'
        run: |
          echo "Installing Rust Best Practices skill using npx skills CLI"
          npx --yes skills add /tmp/skills-repo --skill rust-best-practices --agent github-copilot --global --yes
          echo "Rust Best Practices skill installed successfully"

      - name: Copy Documentation Instructions
        if: steps.cache-skills.outputs.cache-hit != 'true'
        run: |
          echo "Copying documentation instructions from cloned skills repository"
          mkdir -p ~/.copilot/instructions
          # Copy the docs instructions from the cloned repository
          cp /tmp/skills-repo/.github/instructions/docs.instructions.md ~/.copilot/instructions/docs.instructions.md
          echo "Documentation instructions copied to ~/.copilot/instructions/docs.instructions.md"

      - name: Install dev environment
        uses: jdx/mise-action@v3
