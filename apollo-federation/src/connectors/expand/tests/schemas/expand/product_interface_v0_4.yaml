subgraphs:
  one:
    routing_url: http://none
    schema:
      sdl: |
        extend schema
          @link(
            url: "https://specs.apollo.dev/federation/v2.11"
            import: ["@key"]
          )
          @link(
            url: "https://specs.apollo.dev/connect/v0.4"
            import: ["@connect", "@source"]
          )
          @source(
            name: "products-api"
            http: { baseURL: "http://localhost:3001" }
          )

        interface Product {
          upc: ID!
          title: String
        }

        type Book implements Product {
          upc: ID!
          title: String
          author: Person
        }

        type Film implements Product {
          upc: ID!
          title: String
          director: Person
        }

        type Person {
          id: ID!
          name: String
        }

        type Query {
          person(id: ID!): Person @connect(
            source: "products-api"
            http: { GET: "/users/{$args.id}" }
            entity: true
            selection: "id name"
          )

          products: [Product]
            @connect(
              source: "products-api"
              http: { GET: "/products" }
              selection: """
                $.items {
                  upc
                  title
                }
              """
            )
        }
