extend schema
  @link(
    url: "https://specs.apollo.dev/connect/v0.5"
    import: ["@connect", "@source"]
  )
  @source(name: "v1", http: { baseURL: "http://127.0.0.1" })

type Mutation {
  user: UserMutations
    @connect(mappingOnly: true)
}

type UserMutations {
  updateName(name: String): String
    @connect(
      source: "v1"
      http: { POST: "/users/name", body: "$args" }
      selection: """
        name
      """
    )
}
