###
# The only mandatory parameter is the url, which specifies the target of an HTTP post payload
#
# optional parameters:
# - timeout: defaults to 1s if not specified
# - router_http: raw HTTP layer (before Router pipeline); request/response with headers, path, method, body, etc.
# - router: RouterService stage; request/response with headers, context, body, sdl, etc.
###
coprocessor:
  url: http://127.0.0.1:8081
  timeout: 5s
  # RouterHttp: earliest stage, at the raw HTTP layer (e.g. inspect path, method, headers before GraphQL)
  router_http:
    request:
      headers: true
      path: true
      method: true
    response:
      headers: true
      status_code: true
  router:
    request:
      headers: true
      context: true
      body: true
      sdl: true
    response:
      headers: true
