# Same config as ../jaeger.router.yaml — local Jaeger OTLP, full span instrumentation.
# This copy keeps the example self-contained. Use docker-compose here to start Jaeger.
telemetry:
  exporters:
    tracing:
      propagation:
        jaeger: true
      experimental_response_trace_id:
        enabled: true
        header_name: apollo-custom-trace-id
      common:
        service_name: router
        resource:
          env: local
          service.version: local-example
      otlp:
        enabled: true
        protocol: http
        endpoint: http://127.0.0.1:4318
        batch_processor:
          scheduled_delay: 100ms
  instrumentation:
    spans:
      mode: spec_compliant
      supergraph:
        attributes:
          graphql.operation.name: true
      subgraph:
        attributes:
          otel.name:
            subgraph_operation_name: string
